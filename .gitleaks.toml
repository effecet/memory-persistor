# Gitleaks Configuration
# https://github.com/gitleaks/gitleaks
#
# Uses gitleaks' built-in detection rules (no custom [[rules]]). The
# [allowlist] block below suppresses known-safe files and placeholder
# patterns used in documentation/templates.
#
# NOTE: Prior versions of this file had [[rules]] blocks with descriptions
# like "Allow placeholder passwords in X" — that syntax actually ADDS
# detection rules, producing false positives. Fixed 2026-04-17 by moving
# the placeholder patterns into the [allowlist] block where they belong.

title = "memory-persistor gitleaks config"

[allowlist]
description = "Project-scoped allowlist — local-only files + documentation placeholders"

# Local-only files never committed to git
paths = [
  '''\.env$''',
  '''\.env\..*$''',
  '''.*\.log$''',
  '''node_modules/.*''',
  '''dist/.*''',
  '''backups/.*''',
  '''\.gitleaks\.toml$''',
  # Documentation files that contain intentional placeholder credentials
]

# Placeholder patterns safe in tracked config/examples
regexes = [
  # docker-compose local dev password
  '''POSTGRES_PASSWORD:\s*\$\{POSTGRES_PASSWORD:-localdev\}''',
  # example env templates use these literal placeholders
  '''yourpassword''',
  '''localdev''',
]
