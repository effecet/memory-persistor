name: ci
on: [push, pull_request]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests (Vitest)
        run: npx vitest run --exclude 'tests/integration/**'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Python tests (scripts)
        run: |
          pip install pytest
          pytest tests/ -q || [ $? -eq 5 ]   # exit 5 = no tests collected, that's fine

      - name: Gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          CONFIG_ARGS=""
          [ -f .gitleaks.toml ] && CONFIG_ARGS="--config .gitleaks.toml"
          gitleaks detect $CONFIG_ARGS --source . --redact --exit-code 1 --verbose
