# Dependabot version-update PRs.
# Security alerts are separate (auto-enabled on public repos); this file governs
# scheduled version bumps. The npm tree is dominated by @huggingface/transformers
# (onnxruntime, sharp, …), so npm updates are grouped into a single weekly PR to
# avoid a flood — most of those transitive bumps move together anyway.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "[deps]"
    groups:
      npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "[ci]"
    groups:
      github-actions:
        patterns:
          - "*"
